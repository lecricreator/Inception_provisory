services:
  nginx:
    container_name: ${CONTAINER_NAME}-nginx
    image: nginx:1.29.8-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:80"
    volumes:
      - ${PATH_LOCAL_FILE}/nginx:/etc/nginx/conf.d:rw
      - ${PATH_LOCAL_FILE}/wordpress:/var/www/html
    networks:
      - internal

  database:
    container_name: ${CONTAINER_NAME}-database
    image: mariadb
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
      MYSQL_USER: ${DATABASE_USER}
      MARIADB_ROOT_PASSWORD: ${DATABASE_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$DATABASE_ROOT_PASSWORD"]
      interval: 30s
      timeout: 30s
      retries: 10
    ports:
      - "3306:3306"
    volumes:
      - ${PATH_LOCAL_FILE}/dbdata:/var/lib/mysql
    networks:
      - internal

  phpmyadmin:
    container_name: ${CONTAINER_NAME}-phpmyadmin
    image: phpmyadmin/phpmyadmin
    env_file: .env
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
    ports:
      - "8081:80"
    networks:
      - internal

  wordpress:
    depends_on:
      - database
    container_name: ${CONTAINER_NAME}-wordpress
    image: wordpress:6.9.4-php8.2-fpm
    restart: unless-stopped
    env_file: .env
    environment:
      WORDPRESS_DB_NAME: ${DATABASE_NAME}
      WORDPRESS_DB_USER: ${DATABASE_USER}
      WORDPRESS_DB_PASSWORD: ${DATABASE_PASSWORD}
      WORDPRESS_DB_HOST: database:3306
      WORDPRESS_CONFIG_EXTRA: |
        define('FS_METHOD', 'direct');
    user: "${UID}:${GID}"
    volumes:
      - ${PATH_LOCAL_FILE}/wordpress/src/themes:/var/www/html/wp-content/themes
      - ${PATH_LOCAL_FILE}/wordpress/src/plugins:/var/www/html/wp-content/plugins
    networks:
      - internal

volumes:
  dbdata:
  wordpress:

networks:
  internal:
    driver: bridge
